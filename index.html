function calcFP(s){
  if(!s) return null;
  const {pts=0,reb=0,ast=0,stl=0,blk=0,tpm=0,to=0}=s;
  const base=pts*1+reb*1.25+ast*1.5+stl*2+blk*2+tpm*0.5+to*(-0.5);

  const bonus=cats>=3?5:cats>=2?3:0;
  return Math.round((base+bonus)*10)/10;
}

// ── LIVE STATS REFRESH ENGINE ─────────────────────────────────────────────────
// Uses balldontlie.io free API (get your free key at balldontlie.io in 30 sec)
// Falls back to hardcoded STATS if no key or API fails.
// The free tier allows 60 requests/min — more than enough for our ~100 players.

const BDL_BASE = "https://api.balldontlie.io/v1";

// All rostered players we want to look up (name as in STATS object)
function getRosterNames(){
  const seen = new Set();
  const names = [];
  BASE_PLAYERS.forEach(function(p){
    if(!seen.has(p.name)){ seen.add(p.name); names.push(p.name); }
  });
  return names;
}

// Search for a player by name → returns {id, first_name, last_name}
async function bdlSearchPlayer(name, apiKey){
  const parts = name.split(" ");
  const search = encodeURIComponent(name);
  const url = BDL_BASE + "/players?search=" + search + "&per_page=5";
  const res = await fetch(url, {
    headers: { "Authorization": apiKey }
  });
  if(!res.ok) throw new Error("BDL search failed: " + res.status);
  const data = await res.json();
  if(!data.data || data.data.length === 0) return null;
  // Find best match (exact last name match preferred)
  const lastName = parts[parts.length-1].toLowerCase();
  const exact = data.data.find(function(p){
    return p.last_name.toLowerCase() === lastName;
  });
  return exact || data.data[0];
}

// Get season averages for a list of player IDs
async function bdlSeasonAverages(playerIds, season, apiKey){
  if(!playerIds.length) return [];
  const idParams = playerIds.map(function(id){ return "player_ids[]=" + id; }).join("&");
  const url = BDL_BASE + "/season_averages?season=" + season + "&" + idParams;
  const res = await fetch(url, {
    headers: { "Authorization": apiKey }
  });
  if(!res.ok) throw new Error("BDL averages failed: " + res.status);
  const data = await res.json();
  return data.data || [];
}

// Map BDL stat object → our STATS format
function bdlToStats(avg){
  return {
    pts:  Math.round((avg.pts||0)*10)/10,
    reb:  Math.round((avg.reb||0)*10)/10,
    ast:  Math.round((avg.ast||0)*10)/10,
    stl:  Math.round((avg.stl||0)*10)/10,
    blk:  Math.round((avg.blk||0)*10)/10,
    tpm:  Math.round((avg.fg3m||0)*10)/10,
    to:   Math.round((avg.turnover||0)*10)/10,
    gp:   avg.games_played||avg.gp||0,
  };
}

// Main stats refresh function — returns updated STATS-format object
async function refreshLiveStats(apiKey, onProgress){
  const names = getRosterNames();
  const total = names.length;
  let done = 0;

  onProgress("Finding players on balldontlie.io...", 0, total);

  // Step 1: resolve name → BDL player id (batch in chunks to respect rate limits)
  const CHUNK = 10;
  const nameToId = {};
  const errors = [];

  for(let i=0; i<names.length; i+=CHUNK){
    const chunk = names.slice(i, i+CHUNK);
    await Promise.all(chunk.map(async function(name){
      try{
        const player = await bdlSearchPlayer(name, apiKey);
        if(player) nameToId[name] = player.id;
        else errors.push(name + " (not found)");
      } catch(e){
        errors.push(name + " (error: " + e.message + ")");
      }
    }));
    done += chunk.length;
    onProgress("Searching players... " + done + "/" + total, done, total);
    // Small delay to stay under rate limit
    if(i + CHUNK < names.length) await new Promise(r => setTimeout(r, 300));
  }

  onProgress("Fetching season averages...", done, total);

  // Step 2: batch fetch season averages (BDL allows multiple IDs per request)
  const allIds = Object.values(nameToId);
  const ID_CHUNK = 25; // BDL accepts up to 25 IDs per request
  const avgMap = {}; // playerId → avg object

  for(let i=0; i<allIds.length; i+=ID_CHUNK){
    const chunk = allIds.slice(i, i+ID_CHUNK);
    try{
      // Try 2024-25 season first (season param = year season STARTED)
      const avgs = await bdlSeasonAverages(chunk, 2024, apiKey);
      avgs.forEach(function(a){ avgMap[a.player_id] = a; });
    } catch(e){
      errors.push("Averages batch failed: " + e.message);
    }
    if(i + ID_CHUNK < allIds.length) await new Promise(r => setTimeout(r, 300));
  }

  // Step 3: build updated stats object
  const updatedStats = {};
  let updated = 0;
  let missing = 0;

  names.forEach(function(name){
    const id = nameToId[name];
    if(id && avgMap[id]){
      updatedStats[name] = bdlToStats(avgMap[id]);
      updated++;
    } else {
      // Keep hardcoded stats as fallback
      if(STATS[name]) updatedStats[name] = STATS[name];
      missing++;
    }
  });

  onProgress("Done!", total, total);
  return { stats: updatedStats, updated, missing, errors };
}

function getPickData(t,live){if(live&&live[t])return live[t];return DRAFT_PICKS[t]||{picks:[],totalValue:0,summary:"No data"};}

function pickCapitalBonus(teamName){
  var d=DRAFT_PICKS[teamName];
  if(!d||!d.totalValue) return 0;
  // Scale: 424 (max) -> 15 pts, 0 -> 0 pts
  return Math.round(Math.min(d.totalValue/30, 15));
}

// Format fit calculation for prospects using this league's rules
function prospectFP(s){
  if(!s) return null;
  var pts=s.pts||0,reb=s.reb||0,ast=s.ast||0,stl=s.stl||0,blk=s.blk||0,tpm=s.tpm||0,to=s.to||0;
  var base=pts*1+reb*1.25+ast*1.5+stl*2+blk*2+tpm*0.5+to*(-0.5);
  var cats=[pts>=10,reb>=10,ast>=10].filter(Boolean).length;
  var bonus=cats>=3?5:cats>=2?3:0;
  return Math.round((base+bonus)*10)/10;
}

function dedupe(arr){
  const s=new Set();
  return arr.filter(p=>{const k=p.id+p.team+p.slot;if(s.has(k))return false;s.add(k);return true;});
}

function teamScore(ps,key,teamName){
  const st=ps.filter(p=>p.slot==="starter");
  const bn=ps.filter(p=>p.slot==="bench");
  const tx=ps.filter(p=>p.slot==="taxi");
  const avg=a=>a.length?Math.round(a.reduce((s,p)=>s+(p[key]||0),0)/a.length):0;
  const top=[...st,...bn].sort((a,b)=>(b[key]||0)-(a[key]||0))[0];
  const pickBonus=teamName?pickCapitalBonus(teamName):0;
  const overall=Math.round(avg(st)*0.55+avg(bn)*0.25+avg(tx)*0.1+(top?(top[key]||0)*0.1:0)+pickBonus);
  const ages=ps.filter(p=>p.slot!=="taxi");
  const avgAge=ages.length?Math.round(ages.reduce((s,p)=>s+(p.age||0),0)/ages.length*10)/10:0;
  const fpSum=Math.round(st.reduce((s,p)=>{const f=getFP(p.name);return f?s+f:s;},0)*10)/10;
  const pickVal=(DRAFT_PICKS[teamName]&&DRAFT_PICKS[teamName].totalValue)||0;
  const pickCount=(DRAFT_PICKS[teamName]&&DRAFT_PICKS[teamName].picks&&DRAFT_PICKS[teamName].picks.length)||0;
  return{starterAvg:avg(st),rosterAvg:avg([...st,...bn]),taxiAvg:avg(tx),overall,top,avgAge,fpSum,pickBonus,pickVal,pickCount};
}

const PROXIES=["https://corsproxy.io/?url=","https://api.allorigins.win/raw?url=","https://cors.lol/?url=",""];

async function fetchWithFallback(url){
  for(var i=0;i<PROXIES.length;i++){
    var proxy=PROXIES[i];
    var fullUrl=proxy?(proxy+encodeURIComponent(url)):url;
    try{
      var ctrl=new AbortController();
      var timer=setTimeout(function(){ctrl.abort();},10000);
      var res=await fetch(fullUrl,{signal:ctrl.signal,cache:"no-cache"});
      clearTimeout(timer);
      if(res.ok){return await res.json();}
    }catch(e){}
  }
  throw new Error("All proxies failed");
}

async function fetchSleeper(path){
  const url="https://api.sleeper.app/v1"+path;
  return fetchWithFallback(url);
}

async function fetchSleeperPlayerNames(ids){
  try{
    const data=await fetchWithFallback("https://api.sleeper.app/v1/players/nba");
    const out={};
    ids.forEach(pid=>{
      if(data[pid]){
        const p=data[pid];
        out[pid]={
          name:p.full_name||((p.first_name||"")+" "+(p.last_name||"")).trim()||("Player #"+pid),
          pos:p.position||"?",
          nba:p.team||"FA",
          age:p.age||0,
        };
      }
    });
    return out;
  }catch(e){return {};}
}

async function fetchTradedPicks(rMap){
  try{
    var picks=await fetchSleeper("/league/"+LEAGUE_ID+"/traded_picks");
    if(!Array.isArray(picks))return null;
    var byOwner={};
    picks.forEach(function(pk){
      if(!byOwner[pk.owner_id])byOwner[pk.owner_id]=[];
      var orig=rMap[String(pk.roster_id)]||("R#"+pk.roster_id);
      var own=rMap[String(pk.owner_id)]||("R#"+pk.owner_id);
      byOwner[pk.owner_id].push({year:parseInt(pk.season),rd:pk.round,orig:orig!==own?orig:null,
        val:calcPV(pk.season,pk.round),label:pk.season+" Rd"+pk.round+(orig!==own?" ("+orig+")":"")});
    });
    var result={};
    Object.keys(TEAMS_META).forEach(function(t){result[t]={picks:[],totalValue:0,summary:"Live"};});
    Object.keys(byOwner).forEach(function(rid){
      var tn=rMap[String(rid)];if(!tn)return;
      if(!result[tn])result[tn]={picks:[],totalValue:0,summary:"Live"};
      byOwner[rid].forEach(function(p){result[tn].picks.push(p);result[tn].totalValue+=p.val;});
      result[tn].picks.sort(function(a,b){return a.year-b.year||a.rd-b.rd;});
    });
    return result;
  }catch(e){return null;}
}

    });
  });
  if(unknownIds.size>0){
    const looked=await fetchSleeperPlayerNames([...unknownIds]);
    updated.forEach((p,i)=>{
      if(p.unknown&&looked[p.id]){
        const info=looked[p.id];
        updated[i]=Object.assign({},p,{name:info.name,pos:info.pos,nba:info.nba,age:info.age,note:"Auto-resolved from Sleeper. Set dynasty values via Edit."});
      }
    });
  }
  const livePicks=await fetchTradedPicks(rMap);
  const standings={};
  rosters.forEach(function(r2){
    var tn=rMap[String(r2.roster_id)];if(!tn)return;
    var s=r2.settings||{};
    standings[tn]={w:s.wins||0,l:s.losses||0,pf:Math.round(((s.fpts||0)+(s.fpts_decimal||0)*0.01)*100)/100,pa:Math.round(((s.fpts_against||0)+(s.fpts_against_decimal||0)*0.01)*100)/100};
  });
  return{players:updated,unknownCount:unknownIds.size,livePicks:livePicks,standings:standings};
}

  // ── SORTABLE TABLE HELPER ─────────────────────────────────────────────────
  // Returns [sortKey, sortDir, setSortKey, setSortDir] and a SortTh component
  function useSortable(defaultKey, defaultDir){
    defaultDir = defaultDir||"desc";
    const [sk, setSk] = useState(defaultKey);
    const [sd, setSd] = useState(defaultDir);
    function SortTh(col, key, style){
      const active = sk===key;
      const arrow = active ? (sd==="asc"?"  ▲":"  ▼") : "  ↕";
      return h("th",{
        key:col,
        onClick:function(){
          if(sk===key) setSd(function(d){return d==="asc"?"desc":"asc";});
          else { setSk(key); setSd(defaultDir); }
        },
        style:Object.assign({
          fontSize:12,color:active?"#111":"#6b7280",fontWeight:active?800:600,
          padding:"6px 10px",textAlign:"left",borderBottom:"1px solid #e5e7eb",
          whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",
          background:active?"#f0f9ff":"transparent",
        },style||{})
      },col,h("span",{style:{fontSize:9,opacity:active?1:0.4}},arrow));
    }
    function sortRows(arr, getVal){
      return arr.slice().sort(function(a,b){
        var va=getVal(a), vb=getVal(b);
        if(va===null||va===undefined) va = sd==="asc" ? Infinity : -Infinity;
        if(vb===null||vb===undefined) vb = sd==="asc" ? Infinity : -Infinity;
        if(typeof va==="string"&&typeof vb==="string"){
          return sd==="asc"?va.localeCompare(vb):vb.localeCompare(va);
        }
        return sd==="asc"?va-vb:vb-va;
      });
    }
    return [sk, sd, SortTh, sortRows];
  }

  // ── PLAYOFF PREDICTOR TAB ─────────────────────────────────────────────────
  function PlayoffTab(){
    // ── LIVE W/L STATE (updates via Refresh or manual entry) ─────────────────
    const [wlRecords,setWlRecords]=useState(function(){var r={};Object.keys(TEAMS_META).forEach(function(t){r[t]={w:0,l:0};});return r;});
    useEffect(function(){
      if(liveStandings&&Object.values(liveStandings).some(function(s){return s.w>0||s.l>0;}))setWlRecords(liveStandings);
    },[liveStandings]);
    const [editingWL, setEditingWL] = useState(false);
    const [wlDraft, setWlDraft] = useState(null);

    // ── PROJECTION ENGINE ─────────────────────────────────────────────────────
    // Build power rating for each team combining multiple factors
    function buildPowerRatings(){
      // Primary signal = FP/G of actual starters using league scoring:
      // pts(1) ast(1.5) reb(1.25) stl(2) blk(2) 3pm(0.5) to(-0.5) DD(+3) TD(+5)
      var ratings = {};
      Object.keys(TEAMS_META).forEach(function(teamName){
        var ps      = activeRosters.filter(function(p){ return p.team===teamName; });
        var starters= ps.filter(function(p){ return p.slot==="starter"; });
        var bench   = ps.filter(function(p){ return p.slot==="bench"; });
        var sc      = teamScore(ps,"dyn",teamName);

        // ── Real FP/G sum for starters ────────────────────────────────────────
        var starterFPG = 0;
        starters.forEach(function(p){
          var s = getStatsForPlayer(p.name);  // uses live stats if available
          if(s){ starterFPG += calcFP(s)||0; }
          else { starterFPG += 12 + (p.dyn||30)*0.28; } // proxy for no-stat players
        });

        // Bench depth bonus (scaled)
        var benchFPG = 0;
        bench.forEach(function(p){
          var s=getStatsForPlayer(p.name);
          benchFPG += s ? (calcFP(s)||0) : (10 + (p.dyn||25)*0.2);
        });
        var depthBonus = Math.max(0, Math.min(6, (benchFPG-100)*0.03));

        // Steals bonus: stl worth 2pts — steals-heavy teams outperform
        var teamStl = starters.reduce(function(s,p){
          var st=getStatsForPlayer(p.name); return s+(st?st.stl:0.8);},0);
        var stealBonus = Math.max(0,(teamStl-8)*0.9);

        // Blocks bonus: blk worth 2pts
        var teamBlk = starters.reduce(function(s,p){
          var st=getStatsForPlayer(p.name); return s+(st?st.blk:0.5);},0);
        var blockBonus = Math.max(0,(teamBlk-4)*1.1);

        // DD potential: players who regularly put up 10+ in 2 cats
        var ddCount = starters.filter(function(p){
          var s=getStatsForPlayer(p.name);
          return s&&((s.reb>=8&&s.pts>=14)||(s.ast>=7&&s.pts>=14)||(s.reb>=10));
        }).length;
        var ddBonus = ddCount * 0.9;

        // TO penalty: to worth -0.5pts
        var teamTO = starters.reduce(function(s,p){
          var st=getStatsForPlayer(p.name); return s+(st?st.to:2.0);},0);
        var toPenalty = Math.max(0,(teamTO-18)*0.55);

        // IR penalty
        var irCount = ps.filter(function(p){return p.slot==="ir";}).length;
        var injuryPenalty = irCount*1.5;

        // Age drag for very old rosters
        var agePenalty = sc.avgAge>=34 ? -(sc.avgAge-33)*1.6 : 0;

        // Map starterFPG (~150-310) to rating (45-95)
        var fpBase = 40 + (starterFPG-150)*0.21;
        var raw = fpBase + depthBonus + stealBonus + blockBonus + ddBonus
                  - toPenalty - injuryPenalty + agePenalty;

        ratings[teamName] = {
          total:        Math.round(Math.max(30,Math.min(98,raw))),
          starterFPG:   Math.round(starterFPG*10)/10,
          depthBonus:   Math.round(depthBonus*10)/10,
          stealBonus:   Math.round(stealBonus*10)/10,
          blockBonus:   Math.round(blockBonus*10)/10,
          ddBonus:      Math.round(ddBonus*10)/10,
          toPenalty:    Math.round(toPenalty*10)/10,
          injuryPenalty:Math.round(injuryPenalty*10)/10,
        };
      });
      return ratings;
    }

    // Project head-to-head win prob using Elo-style formula
    function winProb(ratingA, ratingB){
      var a=typeof ratingA==="object"?ratingA.total:ratingA;
      var b=typeof ratingB==="object"?ratingB.total:ratingB;
      return 1 / (1 + Math.pow(10, (b - a) / 25));
    }

    // Build a round-robin 20-game schedule (each team plays each other ~1-2x)
    // 12 teams, 20 games each. Each pair plays exactly once + 8 rematches for top rivalries
    function buildSchedule(ratings){
      var teams = Object.keys(TEAMS_META);
      var games = []; // [{a, b}]
      // First: every team plays every other team once (11 games)
      for(var i=0;i<teams.length;i++){
        for(var j=i+1;j<teams.length;j++){
          games.push({a:teams[i],b:teams[j]});
        }
      }
      // Second: 8 more matchups — pair by rating proximity (rivalries)
      var sorted = teams.slice().sort(function(a,b){
        var ra=typeof ratings[a]==="object"?ratings[a].total:(ratings[a]||50);
        var rb=typeof ratings[b]==="object"?ratings[b].total:(ratings[b]||50);
        return rb-ra;
      });
      for(var k=0;k<sorted.length-1;k+=2){
        games.push({a:sorted[k],b:sorted[k+1]});
        if(k+2<sorted.length) games.push({a:sorted[k],b:sorted[k+2]});
      }
      // Trim to ensure each team plays exactly 20 — count and adjust
      var counts = {};
      teams.forEach(function(t){counts[t]=0;});
      var used = [];
      for(var g=0;g<games.length;g++){
        var gm = games[g];
        if(counts[gm.a]<20 && counts[gm.b]<20){
          counts[gm.a]++;counts[gm.b]++;
          used.push(gm);
        }
      }
      return used;
    }

    const ratings = useMemo(buildPowerRatings, [activeRosters, liveStats]);

    // Project expected wins for each team over 20 games
    const projections = useMemo(function(){
      var sched = buildSchedule(ratings);
      var proj = {};
      Object.keys(TEAMS_META).forEach(function(t){ proj[t]=0; });
      sched.forEach(function(gm){
        var wp = winProb(ratings[gm.a], ratings[gm.b]);
        proj[gm.a] += wp;

    // Simulate playoff odds via Monte Carlo (5000 runs)
    const playoffOdds = useMemo(function(){

          else wins[gm.b]++;
        });

        // Apply actual current W/L records
        Object.keys(wlRecords).forEach(function(t){
          wins[t] = (wins[t]||0) + (wlRecords[t].w||0);
          // Note: losses don't affect win count but reduce remaining games
        });

        // Sort by wins descending, break ties by power rating
        var sorted = Object.keys(wins).sort(function(a,b){
          if(wins[b]!==wins[a]) return wins[b]-wins[a];
          return ratings[b]-ratings[a];

        // Top 6 make playoffs
        sorted.slice(0,6).forEach(function(t,idx){
          playoffCount[t]++;
          seedCount[idx+1][t]++;
        });
      }

      var result = {};
      Object.keys(TEAMS_META).forEach(function(t){
        result[t] = {
          prob: Math.round(playoffCount[t]/N*100),
          avgSeed: Math.round(Object.keys(seedCount).reduce(function(s,seed){

    // Combined team data sorted by playoff probability
    const teamData = useMemo(function(){
      return Object.keys(TEAMS_META).map(function(name){
        var ps = activeRosters.filter(function(p){ return p.team===name; });

      h("div",{onClick:function(e){e.stopPropagation();},style:{background:"#fff",borderRadius:16,padding:"1.5rem",maxWidth:480,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.25)"}},
        h("div",{style:{fontSize:17,fontWeight:800,marginBottom:12}},"Manual Roster Paste"),
        h("div",{style:{fontSize:12,color:"#6b7280",marginBottom:10}},
          "Open this URL, copy all, paste below:",
          h("div",{style:{fontFamily:"monospace",fontSize:11,background:"#f9fafb",padding:"6px 10px",borderRadius:6,margin:"6px 0",wordBreak:"break-all"}},
            "https://api.sleeper.app/v1/league/1348512479650545664/rosters")),
        h("textarea",{value:manualJson,onChange:function(e){setManualJson(e.target.value);setManualErr("");},placeholder:"Paste roster JSON here...",rows:4,
          style:{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #e5e7eb",fontSize:12,fontFamily:"monospace",resize:"vertical",outline:"none",marginBottom:8}}),
        manualErr&&h("div",{style:{fontSize:12,color:"#b91c1c",marginBottom:6,fontWeight:600}},manualErr),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:handleManualPaste,style:{padding:"8px 20px",borderRadius:8,border:"none",background:"#111",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}},"Load Rosters"),
          h("button",{onClick:function(){setShowManual(false);setManualErr("");},style:{padding:"8px 14px",borderRadius:8,border:"1px solid #e5e7eb",background:"#fff",fontSize:13,cursor:"pointer",color:"#374151"}},"Cancel")
        )
      )
    ),
    // Header
    h(CountdownBanner,{lastRefresh:lastRefresh,lastStatsRefresh:lastStatsRefresh,livePickData:livePickData}),
    h("div",{style:{marginBottom:"1.25rem"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:8}},
        h("div",null,
          h("div",{style:{fontSize:20,fontWeight:800,marginBottom:2}},"🏀 Hoop Heads Dynasty Hub"),
          h("div",{style:{fontSize:12,color:"#9ca3af"}},"12-team NBA dynasty · pts(1) ast(1.5) reb(1.25) stl(2) blk(2) 3pm(0.5) to(−0.5) DD(+3) TD(+5) · Real 2025-26 stats")
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
          lastRefresh&&h("span",{style:{fontSize:11,color:"#9ca3af"}},"Updated "+lastRefresh.toLocaleTimeString()),
          refreshMsg&&h("span",{style:{fontSize:12,fontWeight:600,color:refreshMsg.startsWith("✓")?"#15803d":refreshMsg.startsWith("⚠")?"#b91c1c":"#1d4ed8"}},refreshMsg),
          h("button",{
            onClick:function(){
              if(!apiKey.trim()) setShowApiKeyModal(true);
              else doRefreshStats();
            },
            disabled:statsRefreshing,
            title: apiKey?"Refresh live NBA stats from balldontlie.io":"Click to set up your free API key",
            style:{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",
              borderRadius:8,border:"1.5px solid",fontSize:13,cursor:"pointer",
              fontWeight:600,
              background:statsRefreshing?"#f3f4f6":lastStatsRefresh?"#f0fdf4":"#fff",
              color:statsRefreshing?"#9ca3af":lastStatsRefresh?"#15803d":"#374151",
              borderColor:statsRefreshing?"#e5e7eb":lastStatsRefresh?"#86efac":"#e5e7eb"}},
            h("span",{style:{fontSize:13}},"📊"),
            statsRefreshing?"Updating stats...":lastStatsRefresh?"Stats live ✓":"Refresh Stats",
            lastStatsRefresh&&h("span",{style:{fontSize:9,opacity:0.7,marginLeft:2}},
              lastStatsRefresh.toLocaleTimeString())
          ),
          h("button",{onClick:function(){setShowAddPlayer(true);},style:{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:8,border:"1.5px solid #e5e7eb",fontSize:13,cursor:"pointer",fontWeight:600,background:"#fff",color:"#374151"}},
            "+ Add Player",
            customPlayers.length>0&&h("span",{style:{background:"#111",color:"#fff",borderRadius:10,fontSize:10,padding:"1px 6px",fontWeight:700}},customPlayers.length)
          ),
          h("button",{onClick:doRefresh,disabled:refreshing,style:{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:8,border:"1.5px solid",fontSize:13,fontWeight:600,background:refreshing?"#f3f4f6":"#111",color:refreshing?"#9ca3af":"#fff",borderColor:refreshing?"#e5e7eb":"#111",cursor:refreshing?"not-allowed":"pointer"}},
            h("span",{className:refreshing?"spin":"",style:{fontSize:15}},"⟳"),
            refreshing?"Refreshing...":"Refresh Rosters"
          )
        )
      )
    ),
    // Tabs
    h("div",{style:{display:"flex",gap:6,marginBottom:"1.25rem",flexWrap:"wrap"}},
      tabs.map(function(t){
        return h("button",{key:t[0],onClick:function(){setTab(t[0]);if(t[0]!=="roster")setSelTeam(null);},
          style:{padding:"7px 14px",borderRadius:8,border:"1.5px solid",fontSize:13,cursor:"pointer",fontWeight:tab===t[0]?700:400,background:tab===t[0]?"#111":"#fff",color:tab===t[0]?"#fff":"#374151",borderColor:tab===t[0]?"#111":"#e5e7eb"}},
          t[1]
        );
      })
    ),
    // Tab content
    h(ScoreLegendBanner),
    h(ProjBar),
    tab==="teams"&&h(TeamsTab),
    tab==="players"&&h(PlayersTab),
    tab==="roster"&&h(RosterTab),
    tab==="compare"&&h(CompareTab),
    tab==="trade"&&h(TradeTab),
    tab==="draft"&&h(DraftTab),
    tab==="playoffs"&&h(PlayoffTab),
    tab==="mockdraft"&&h(MockDraftTab)
  );
}

try{
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(App));
}catch(e){
  const d=document.getElementById("err");
  if(d){d.style.display="block";d.textContent="React render error:\n"+e.message+"\n"+e.stack;}
}

</script>
</body>
</html>
